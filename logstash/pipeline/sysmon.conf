input {
  file {
    path => "/var/log/sample/sysmon.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["sysmon", "endpoint"]
  }
}

filter {
  if "sysmon" in [tags] {
    date {
      match => ["UtcTime", "yyyy-MM-dd HH:mm:ss.SSS"]
      target => "@timestamp"
    }

    mutate {
      rename => {
        "SourceIp" => "source.ip"
        "DestinationIp" => "destination.ip"
        "DestinationPort" => "destination.port"
        "Image" => "process.executable"
        "CommandLine" => "process.command_line"
        "ParentImage" => "process.parent.executable"
        "User" => "user.name"
        "Hashes" => "file.hash.sha256"
      }
    }

    if [EventID] == 1 and [process.command_line] =~ /(?i)(powershell.*-enc|cmd.*\/c|certutil|bitsadmin|mshta)/ {
      mutate { add_tag => ["suspicious", "execution"] }
      mutate { add_field => { "event.category" => "process" } }
      mutate { add_field => { "threat.technique.id" => "T1059" } }
    }

    if [EventID] == 3 and [destination.port] {
      if [destination.port] in [4444, 5555, 8888, 1234] {
        mutate { add_tag => ["suspicious", "c2"] }
        mutate { add_field => { "threat.technique.id" => "T1071" } }
      }
    }

    if [EventID] == 11 and [TargetFilename] =~ /(?i)(\.exe|\.dll|\.bat|\.ps1|\.vbs)$/ {
      if [TargetFilename] =~ /(?i)(temp|tmp|appdata|downloads)/ {
        mutate { add_tag => ["suspicious", "file_creation"] }
        mutate { add_field => { "threat.technique.id" => "T1105" } }
      }
    }
  }
}

output {
  if "sysmon" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-sysmon-%{+YYYY.MM.dd}"
    }
  }
}
