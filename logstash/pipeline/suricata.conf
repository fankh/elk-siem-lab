input {
  file {
    path => "/var/log/sample/suricata-eve.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    tags => ["suricata", "ids"]
  }
}

filter {
  if "suricata" in [tags] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    mutate {
      rename => {
        "src_ip" => "source.ip"
        "src_port" => "source.port"
        "dest_ip" => "destination.ip"
        "dest_port" => "destination.port"
        "proto" => "network.transport"
      }
    }

    if [event_type] == "alert" {
      mutate {
        add_field => { "event.category" => "intrusion_detection" }
        rename => {
          "[alert][signature]" => "rule.name"
          "[alert][severity]" => "event.severity"
          "[alert][signature_id]" => "rule.id"
          "[alert][category]" => "rule.category"
        }
      }

      if [rule.category] =~ /(?i)scan/ {
        mutate { add_tag => ["attack", "reconnaissance"] }
        mutate { add_field => { "threat.technique.id" => "T1046" } }
      }

      if [rule.category] =~ /(?i)(trojan|malware|exploit)/ {
        mutate { add_tag => ["attack", "malware"] }
      }
    }

    geoip {
      source => "source.ip"
      target => "source.geo"
    }
  }
}

output {
  if "suricata" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-suricata-%{+YYYY.MM.dd}"
    }
  }
}
