input {
  file {
    path => "/var/log/sample/web-access.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["web", "access"]
  }
}

filter {
  if "web" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:source.ip} - %{DATA:user.name} \[%{HTTPDATE:timestamp}\] "%{WORD:http.request.method} %{URIPATHPARAM:url.path} HTTP/%{NUMBER:http.version}" %{NUMBER:http.response.status_code:int} %{NUMBER:http.response.body.bytes:int} "%{DATA:http.request.referrer}" "%{DATA:user_agent.original}"'
      }
    }

    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }

    geoip {
      source => "source.ip"
      target => "source.geo"
    }

    useragent {
      source => "user_agent.original"
      target => "user_agent"
    }

    # Copy and decode URL for attack pattern matching
    mutate { copy => { "url.path" => "url.path_decoded" } }
    urldecode { field => "url.path_decoded" }

    if [url.path_decoded] =~ /(?i)(union\s+(all\s+)?select|or\s+.1.\s*=\s*.1.|drop\s+table|sleep\(|benchmark\(|'\s*--|and\s+\(select)/ {
      mutate { add_tag => ["attack", "sqli"] }
      mutate { add_field => { "event.category" => "intrusion_detection" } }
      mutate { add_field => { "threat.technique.id" => "T1190" } }
    }

    if [url.path_decoded] =~ /(?i)(<script|javascript:|onerror\s*=|onload\s*=)/ {
      mutate { add_tag => ["attack", "xss"] }
      mutate { add_field => { "event.category" => "intrusion_detection" } }
      mutate { add_field => { "threat.technique.id" => "T1189" } }
    }

    if [url.path_decoded] =~ /(\.\.\/)|(\.\.%2[fF])|(\.\.%5[cC])/ {
      mutate { add_tag => ["attack", "path_traversal"] }
      mutate { add_field => { "event.category" => "intrusion_detection" } }
      mutate { add_field => { "threat.technique.id" => "T1083" } }
    }

    mutate {
      remove_field => ["message", "host"]
    }
  }
}

output {
  if "web" in [tags] {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "security-web-%{+YYYY.MM.dd}"
    }
  }
}
