title: Path Traversal Detection via Web Log
id: a1b2c3d4-0004-4000-8000-000000000004
status: experimental
description: Detects path traversal attempts in web server access logs
author: SIEM Lab
date: 2026/03/26
logsource:
    category: webserver
    product: apache
detection:
    selection_pattern:
        cs-uri|contains:
            - "../"
            - "..%2f"
            - "..%2F"
            - "..%5c"
            - "..%5C"
            - "%2e%2e/"
            - "%2e%2e%2f"
    selection_target:
        cs-uri|contains:
            - "/etc/passwd"
            - "/etc/shadow"
            - "/windows/system32"
            - "web.config"
            - ".htaccess"
            - "wp-config.php"
    condition: selection_pattern or selection_target
level: high
falsepositives:
    - Legitimate file access with relative paths
tags:
    - attack.discovery
    - attack.t1083
