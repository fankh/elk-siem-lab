version: "3.8"

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-8.12.0}
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms2g -Xmx2g}
      - cluster.name=siem-lab
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - elk

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-8.12.0}
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:${ELASTIC_VERSION:-8.12.0}
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./sample-logs:/var/log/sample:ro
    ports:
      - "5044:5044"
    environment:
      - LS_JAVA_OPTS=-Xms512m -Xmx512m
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk

  filebeat:
    image: docker.elastic.co/beats/filebeat:${ELASTIC_VERSION:-8.12.0}
    container_name: filebeat
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./sample-logs:/var/log/sample:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk

  # Tools container - for installing and using sigma-cli, python scripts
  tools:
    build:
      context: .
      dockerfile: tools/Dockerfile
    container_name: tools
    volumes:
      - ./sigma-rules:/lab/sigma-rules:ro
      - ./scripts:/lab/scripts:ro
      - ./sample-logs:/lab/sample-logs:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk

  # Tester container - runs full test suite to verify all components
  tester:
    build:
      context: .
      dockerfile: tools/Dockerfile
    container_name: tester
    volumes:
      - ./tools:/lab/tools:ro
      - ./sigma-rules:/lab/sigma-rules:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk
    entrypoint: ["bash", "/lab/tools/test-all.sh"]
    profiles:
      - test

volumes:
  es-data:
    driver: local

networks:
  elk:
    driver: bridge
